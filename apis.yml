aid: mandt-bank
name: M&T Bank
description: >-
  M&T Bank is a regional bank holding company headquartered in Buffalo, New York,
  providing commercial and retail banking services to consumers and businesses
  across the eastern United States. As a subsidiary of M&T Bank Corporation
  (NYSE: MTB), it offers checking, savings, lending, mortgage, wealth management,
  and treasury services.
